<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articulate Ape Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Variables for Easy Theming --- */
        :root {
            --bg-color: #0a0a0c;
            --text-main: #f0f0f0;
            --text-muted: #8892b0;
            --accent: #00e6b8;
            --accent-glow: rgba(0, 230, 184, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        /* --- Global Styles --- */
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .logo {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* --- Animations --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px var(--accent-glow); }
            50% { text-shadow: 0 0 25px var(--accent), 0 0 35px var(--accent); }
            100% { text-shadow: 0 0 10px var(--accent-glow); }
        }

        /* --- Header & Navigation (Glassmorphism) --- */
        header {
            background: rgba(10, 10, 12, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .logo span {
            color: var(--accent);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }

        nav a {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-main);
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, rgba(0,230,184,0.1) 0%, var(--bg-color) 70%);
            padding: 0 20px;
            animation: fadeInDown 1.2s ease-out;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            margin-bottom: 20px;
            animation: pulseGlow 4s infinite;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--bg-color);
            background-color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn:hover {
            background-color: transparent;
            color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow) inset, 0 0 30px var(--accent-glow);
        }

        /* --- Main Container --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 50px;
            text-align: center;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 60px;
            height: 4px;
            background: var(--accent);
            display: block;
            margin: 15px auto 0;
            border-radius: 2px;
        }

        /* --- Projects Section --- */
        .project-section {
            margin-bottom: 100px;
        }
